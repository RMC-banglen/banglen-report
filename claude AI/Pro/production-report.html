<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>รายงานการผลิตเสาเข็มคอนกรีตอัดแรง</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f4f6f9;
    --surface: #ffffff;
    --line: #e8ebf1;
    --line-strong: #dce1ea;
    --ink: #1f2733;
    --ink-soft: #46505f;
    --muted: #79839280;
    --muted-text: #6a7382;
    --primary: #2f5fd0;
    --primary-dark: #244c9b;
    --primary-wash: #eef3fc;
    --radius: 12px;
    --shadow: 0 1px 2px rgba(22,34,51,0.04), 0 4px 14px rgba(22,34,51,0.05);
    --font: 'IBM Plex Sans Thai', 'IBM Plex Sans', system-ui, sans-serif;
    --num: 'IBM Plex Sans', 'IBM Plex Sans Thai', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 1320px; margin: 0 auto; padding: 0 24px 56px; }

  /* ---------- topbar ---------- */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; padding: 22px 4px 18px;
  }
  .topbar__brand { display: flex; align-items: center; gap: 14px; }
  .topbar__mark {
    width: 46px; height: 46px; border-radius: 11px;
    background: linear-gradient(150deg, #3a6ad8, #244c9b);
    display: grid; place-items: center; box-shadow: 0 4px 12px rgba(36,76,155,0.28);
  }
  .topbar__title { font-size: 20px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
  .topbar__sub { margin: 2px 0 0; font-size: 12.5px; color: var(--muted-text); font-family: var(--num); letter-spacing: 0.02em; }
  .topbar__actions { display: flex; align-items: center; gap: 14px; }
  .yearpick { display: flex; align-items: center; gap: 10px; }
  .yearpick__lbl { font-size: 13px; color: var(--muted-text); font-weight: 500; }
  .badge-sample {
    font-size: 11.5px; font-weight: 600; color: #9a6b1f; background: #fbf1dd;
    border: 1px solid #f0dcb0; padding: 3px 9px; border-radius: 20px;
  }

  /* ---------- segmented ---------- */
  .seg { display: inline-flex; background: #eef0f4; border-radius: 9px; padding: 3px; gap: 2px; }
  .seg__btn {
    border: 0; background: transparent; font-family: var(--font); font-size: 13.5px; font-weight: 600;
    color: var(--muted-text); padding: 6px 14px; border-radius: 7px; cursor: pointer; transition: all .15s;
  }
  .seg__btn:hover { color: var(--ink); }
  .seg__btn.is-active { background: var(--surface); color: var(--primary); box-shadow: 0 1px 3px rgba(22,34,51,0.12); }

  /* ---------- tabs ---------- */
  .tabs { display: flex; gap: 4px; border-bottom: 1.5px solid var(--line); margin-bottom: 24px; }
  .tabs__btn {
    border: 0; background: transparent; font-family: var(--font); font-size: 15px; font-weight: 600;
    color: var(--muted-text); padding: 12px 18px; cursor: pointer; position: relative; transition: color .15s;
  }
  .tabs__btn:hover { color: var(--ink); }
  .tabs__btn.is-active { color: var(--primary); }
  .tabs__btn.is-active::after {
    content: ''; position: absolute; left: 14px; right: 14px; bottom: -1.5px; height: 2.5px;
    background: var(--primary); border-radius: 3px 3px 0 0;
  }

  /* ---------- grid ---------- */
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
  .kpi-row { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .kpi-row--3 { grid-template-columns: repeat(3, 1fr); }
  .kpi-row--5 { grid-template-columns: repeat(5, 1fr); }
  .card--wide { grid-column: 1 / -1; }
  .card--full { grid-column: 1 / -1; }

  /* ---------- kpi ---------- */
  .kpi {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px 18px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 2px;
  }
  .kpi__label { font-size: 12.5px; color: var(--muted-text); font-weight: 500; }
  .kpi__value { font-family: var(--num); font-size: 26px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; margin-top: 4px; }
  .kpi__unit { font-size: 13px; font-weight: 500; color: var(--muted-text); margin-left: 2px; }
  .kpi__sub { font-size: 11.5px; color: var(--muted-text); margin-top: 3px; line-height: 1.35; }
  .kpi__delta { font-size: 12px; font-weight: 600; margin-top: 5px; color: var(--muted-text); }
  .kpi__delta.up { color: #4f8a32; }
  .kpi__delta.down { color: #c44; }

  /* ---------- card ---------- */
  .card {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden;
  }
  .card__head {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
    padding: 16px 20px 12px; flex-wrap: wrap;
  }
  .card__head > div:first-child { flex: 1 1 auto; min-width: 0; }
  .card__title { font-size: 15.5px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
  .card__sub { font-size: 12px; color: var(--muted-text); margin: 3px 0 0; }
  .card__right { flex-shrink: 0; }
  .card__body { padding: 4px 16px 18px; }

  /* ---------- legend ---------- */
  .legend { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .legend__item { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--ink-soft); font-weight: 500; }
  .legend__sw { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }

  /* ---------- chart axis text ---------- */
  .chart svg text.ax-lbl { font-size: 11px; fill: var(--muted-text); font-family: var(--num); }
  .chart svg text.bar-val { font-size: 10.5px; fill: var(--ink-soft); font-family: var(--num); font-weight: 600; }
  .chart svg text.target-lbl { font-size: 10.5px; font-family: var(--num); font-weight: 600; }
  .donut-val { font-size: 22px; font-weight: 700; fill: var(--ink); font-family: var(--num); }
  .donut-lbl { font-size: 11px; fill: var(--muted-text); }

  /* ---------- tooltip ---------- */
  .chart-tip {
    position: absolute; pointer-events: none; z-index: 20;
    background: #1f2733; color: #fff; border-radius: 8px; padding: 8px 11px;
    font-size: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.22); min-width: 110px; max-width: 220px;
  }
  .chart-tip__title { font-weight: 700; margin-bottom: 5px; font-size: 12px; }
  .chart-tip__row { display: flex; align-items: center; gap: 7px; line-height: 1.7; }
  .chart-tip__dot { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; }
  .chart-tip__lbl { color: #c9d0db; }
  .chart-tip__val { margin-left: auto; font-weight: 700; font-family: var(--num); }

  /* ---------- hbar (causes) ---------- */
  .cause-split { display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px; align-items: center; }
  .cause-split__donut { display: grid; place-items: center; }
  .hbar { display: flex; flex-direction: column; gap: 9px; padding: 6px 0; }
  .hbar__row { display: grid; grid-template-columns: 150px 1fr 38px; align-items: center; gap: 10px; }
  .hbar__lbl { font-size: 12.5px; color: var(--ink-soft); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hbar__track { height: 16px; background: #f0f2f6; border-radius: 5px; overflow: hidden; }
  .hbar__fill { height: 100%; border-radius: 5px; transition: width .4s ease; }
  .hbar__val { font-size: 12.5px; font-weight: 700; font-family: var(--num); color: var(--ink); text-align: left; }

  /* ---------- table ---------- */
  .table-wrap { overflow-x: auto; margin: 0 4px; }
  .dt { width: 100%; border-collapse: collapse; font-size: 13px; font-family: var(--num); }
  .dt th, .dt td { padding: 9px 10px; text-align: right; white-space: nowrap; }
  .dt thead th { font-size: 11.5px; color: var(--muted-text); font-weight: 600; border-bottom: 1.5px solid var(--line-strong); font-family: var(--font); }
  .dt tbody td { border-bottom: 1px solid var(--line); color: var(--ink-soft); }
  .dt tbody tr:hover td { background: var(--primary-wash); }
  .dt .ta-l { text-align: left; }
  .dt .strong { font-weight: 700; color: var(--ink); font-family: var(--font); }
  .dt td.strong { font-family: var(--num); }
  .dt .muted-cell { color: var(--muted-text); }
  .dt .hi-cell { background: var(--primary-wash); color: var(--primary-dark); font-weight: 600; }
  .dt tfoot td { padding: 10px; font-weight: 700; color: var(--ink); border-top: 1.5px solid var(--line-strong); background: #fafbfc; }
  .pill { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11.5px; font-weight: 700; }
  .pill--ok { background: #e8f3e0; color: #4f8a32; }
  .pill--warn { background: #fdeede; color: #b87412; }
  .basis-tag { display: block; font-size: 10px; color: var(--muted-text); margin-top: 3px; font-family: var(--font); }

  .note { font-size: 11.5px; color: var(--muted-text); margin: 12px 4px 2px; }
  .empty { padding: 40px; text-align: center; color: var(--muted-text); font-size: 13.5px; }

  /* ---------- latest month compare card ---------- */
  .verdict { display: inline-flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 700; padding: 8px 15px; border-radius: 24px; white-space: nowrap; }
  .verdict__arrow { font-size: 11px; }
  .verdict--prod { color: #3f7d2b; background: #e9f4e1; }
  .verdict--trans { color: #b06a14; background: #fbf1dd; }
  .latest__body { display: grid; grid-template-columns: 1fr 1.5fr 1fr; align-items: center; gap: 28px; padding: 12px 22px 22px; }
  .latest__stat { display: flex; align-items: center; gap: 13px; }
  .latest__stat--r { justify-content: flex-end; text-align: right; }
  .latest__dot { width: 13px; height: 13px; border-radius: 4px; flex-shrink: 0; }
  .latest__lbl { font-size: 12.5px; color: var(--muted-text); font-weight: 500; }
  .latest__num { font-family: var(--num); font-size: 32px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; margin-top: 2px; }
  .latest__num span { font-size: 14px; font-weight: 500; color: var(--muted-text); margin-left: 3px; }
  .latest__bars { display: flex; flex-direction: column; gap: 9px; }
  .latest__bar { height: 18px; background: #f0f2f6; border-radius: 6px; overflow: hidden; }
  .latest__fill { height: 100%; border-radius: 6px; transition: width .5s ease; }
  .latest__ratio { font-size: 11.5px; color: var(--muted-text); text-align: center; margin-top: 2px; }
  @media (max-width: 760px) {
    .latest__body { grid-template-columns: 1fr; gap: 14px; }
    .latest__stat--r { justify-content: flex-start; text-align: left; }
  }

  /* ---------- stock status card ---------- */
  .stockcard { border-width: 1px; }
  .stockcard--high { border-left: 5px solid #d65b5b; }
  .stockcard--ok { border-left: 5px solid #5a9a3c; }
  .stockcard--low { border-left: 5px solid var(--primary); }
  .stockcard__body { display: flex; align-items: center; gap: 36px; flex-wrap: wrap; padding: 20px 22px 6px; }
  .stockcard__main { flex-shrink: 0; }
  .stockcard__label { font-size: 13px; color: var(--muted-text); font-weight: 500; }
  .stockcard__num { font-family: var(--num); font-size: 46px; font-weight: 700; letter-spacing: -0.025em; line-height: 1.05; color: var(--ink); margin-top: 2px; white-space: nowrap; }
  .stockcard--high .stockcard__num { color: #c0392b; }
  .stockcard--ok .stockcard__num { color: #3f7d2b; }
  .stockcard--low .stockcard__num { color: var(--primary); }
  .stockcard__unit { font-size: 18px; font-weight: 500; color: var(--muted-text); margin-left: 3px; }
  .stockcard__when { font-size: 12px; color: var(--muted-text); margin-top: 2px; }
  .stockcard__delta { display: flex; align-items: center; gap: 9px; padding-left: 4px; flex-shrink: 0; white-space: nowrap; }
  .stockcard__arrow { font-size: 16px; }
  .stockcard__delta.up { color: #3f7d2b; }
  .stockcard__delta.down { color: #c0392b; }
  .stockcard__deltanum { font-family: var(--num); font-size: 19px; font-weight: 700; }
  .stockcard__deltalbl { font-size: 11.5px; color: var(--muted-text); font-weight: 500; }
  .stockcard__status { margin-left: auto; text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
  .stockbadge { display: inline-flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 700; padding: 9px 18px; border-radius: 26px; white-space: nowrap; }
  .stockbadge__emoji { font-size: 17px; }
  .stockbadge--high { background: #fbe9e9; color: #c0392b; }
  .stockbadge--ok { background: #e9f4e1; color: #3f7d2b; }
  .stockbadge--low { background: var(--primary-wash); color: var(--primary); }
  .stockcard__hint { font-size: 12px; color: var(--muted-text); white-space: nowrap; }
  .stockcard__scale { display: flex; gap: 8px; padding: 8px 22px 16px; flex-wrap: wrap; }
  .stockcard__seg { font-size: 11.5px; font-weight: 600; padding: 4px 11px; border-radius: 7px; white-space: nowrap; }
  .stockcard__seg--low { background: var(--primary-wash); color: var(--primary); }
  .stockcard__seg--ok { background: #ecf5e5; color: #4f8a32; }
  .stockcard__seg--high { background: #fbeaea; color: #c0392b; }
  @media (max-width: 760px) {
    .stockcard__status { margin-left: 0; align-items: flex-start; text-align: left; }
  }

  .yc-head { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .yearchips { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .yearchips__lbl { font-size: 13px; color: var(--muted-text); font-weight: 500; margin-right: 2px; }
  .yearchip { display: inline-flex; align-items: center; gap: 7px; border: 1.5px solid var(--line-strong); background: #fff; color: var(--muted-text); font-family: var(--num); font-weight: 600; font-size: 13.5px; padding: 6px 13px; border-radius: 8px; cursor: pointer; transition: all .15s; opacity: 0.5; }
  .yearchip:hover { border-color: #b9c1cd; opacity: 0.8; }
  .yearchip.is-on { opacity: 1; background: #f1f4f9; border-color: #aeb7c4; color: var(--ink); box-shadow: 0 1px 3px rgba(22,34,51,0.07); }
  .yearchip__sw { width: 11px; height: 11px; border-radius: 3px; transition: background .15s; }
  .td-sw { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 7px; vertical-align: middle; }

  .foot { margin-top: 28px; padding-top: 16px; border-top: 1px solid var(--line); font-size: 12px; color: var(--muted-text); text-align: center; font-family: var(--num); }

  @media (max-width: 920px) {
    .grid { grid-template-columns: 1fr; }
    .card--wide, .card--full { grid-column: auto; }
    .kpi-row, .kpi-row--5 { grid-template-columns: repeat(2, 1fr); }
    .kpi-row--3 { grid-template-columns: 1fr; }
    .cause-split { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- ============================================================
       data — ข้อมูลรายงานการผลิตเสาเข็มคอนกรีตอัดแรง
       - ปี 2569: ข้อมูลจริง (จากไฟล์ Excel, ม.ค.–เม.ย.)
       - ปี 2568: ข้อมูลตัวอย่าง (สำหรับเทียบรายปี — แทนตัวเลขจริงได้)
       หน่วยปริมาณ = ลูกบาศก์เมตร (m³) ของคอนกรีต ("คิว")
       ============================================================ -->
  <script>
  (function () {
    const MONTHS_TH = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];

    // ---- รายเดือน ปี 2569 (ข้อมูลจริง) ----
    // order=คิวสั่งผลิต, produced=คิวผลิตจริง, cancel=ค้าง-ยกเลิก,
    // pct=เปอร์เซ็นผลิตได้จริง, days=จำนวนวันที่มีผลิต, perDay=ค่าเฉลี่ยคิว/วัน,
    // transport=คิวขนส่ง, stock=สต็อคคงเหลือ, raftOrder/raftProduced/raftCancel=แพ
    const months2569 = [
      { m: 1, order: 4453.59, produced: 4291.81, cancel: 161.78, pct: 96.50, days: 27, perDay: 158.96, transport: 4024.69, stock: 4257.81, raftOrder: 293,   raftProduced: 283,   raftCancel: 10 },
      { m: 2, order: 3722.51, produced: 3657.43, cancel: 65.08,  pct: 88.28, days: 25, perDay: 146.30, transport: 4402.10, stock: 3530.86, raftOrder: 221,   raftProduced: 219,   raftCancel: 2  },
      { m: 3, order: 4614.79, produced: 4350.12, cancel: 264.67, pct: 87.37, days: 31, perDay: 140.33, transport: 4691.94, stock: 3210.50, raftOrder: 308,   raftProduced: 295,   raftCancel: 10 },
      { m: 4, order: 3453.09, produced: 3268.36, cancel: 184.73, pct: 92.92, days: 21, perDay: 155.64, transport: 2634.03, stock: 3851.02, raftOrder: 231.5, raftProduced: 218.5, raftCancel: 13 },
    ];

    // ---- รายเดือน ปี 2568 (ตัวอย่าง — แทนด้วยข้อมูลจริงได้) ----
    const months2568 = [
      { m: 1,  order: 4120.0, produced: 3902.4, cancel: 217.6, pct: 94.72, days: 26, perDay: 150.1, transport: 3760.5, stock: 3990.2, raftOrder: 268,   raftProduced: 255,   raftCancel: 13 },
      { m: 2,  order: 3580.0, produced: 3401.0, cancel: 179.0, pct: 95.00, days: 24, perDay: 141.7, transport: 3520.8, stock: 3870.4, raftOrder: 214,   raftProduced: 206,   raftCancel: 8  },
      { m: 3,  order: 4380.0, produced: 4029.6, cancel: 350.4, pct: 92.00, days: 30, perDay: 134.3, transport: 4210.0, stock: 3690.0, raftOrder: 295,   raftProduced: 276,   raftCancel: 19 },
      { m: 4,  order: 3260.0, produced: 3064.4, cancel: 195.6, pct: 94.00, days: 22, perDay: 139.3, transport: 3180.0, stock: 3574.4, raftOrder: 220,   raftProduced: 210,   raftCancel: 10 },
      { m: 5,  order: 3980.0, produced: 3741.2, cancel: 238.8, pct: 94.00, days: 27, perDay: 138.6, transport: 3890.0, stock: 3425.6, raftOrder: 262,   raftProduced: 248,   raftCancel: 14 },
      { m: 6,  order: 3710.0, produced: 3450.3, cancel: 259.7, pct: 93.00, days: 25, perDay: 138.0, transport: 3600.0, stock: 3275.9, raftOrder: 244,   raftProduced: 230,   raftCancel: 14 },
      { m: 7,  order: 4250.0, produced: 4037.5, cancel: 212.5, pct: 95.00, days: 29, perDay: 139.2, transport: 4120.0, stock: 3193.4, raftOrder: 281,   raftProduced: 268,   raftCancel: 13 },
      { m: 8,  order: 4410.0, produced: 4145.4, cancel: 264.6, pct: 94.00, days: 30, perDay: 138.2, transport: 4300.0, stock: 3038.8, raftOrder: 292,   raftProduced: 274,   raftCancel: 18 },
      { m: 9,  order: 3890.0, produced: 3617.7, cancel: 272.3, pct: 93.00, days: 26, perDay: 139.1, transport: 3780.0, stock: 2876.5, raftOrder: 256,   raftProduced: 240,   raftCancel: 16 },
      { m: 10, order: 4060.0, produced: 3856.0, cancel: 204.0, pct: 95.00, days: 28, perDay: 137.7, transport: 3960.0, stock: 2772.5, raftOrder: 270,   raftProduced: 257,   raftCancel: 13 },
      { m: 11, order: 4180.0, produced: 3929.2, cancel: 250.8, pct: 94.00, days: 27, perDay: 145.5, transport: 4050.0, stock: 2651.7, raftOrder: 278,   raftProduced: 262,   raftCancel: 16 },
      { m: 12, order: 4530.0, produced: 4258.2, cancel: 271.8, pct: 94.00, days: 30, perDay: 141.9, transport: 4400.0, stock: 2509.9, raftOrder: 301,   raftProduced: 283,   raftCancel: 18 },
    ];

  <!-- ============================================================
       charts — primitive SVG charts (no external libs)
       Exposes to window: useMeasure, fmt, PALETTE, Tooltip,
       GroupedBarChart, BarChart, LineChart, DonutChart, HBarChart
       ============================================================ -->
  <script type="text/babel">
  const { useState, useRef, useEffect, useLayoutEffect, useCallback } = React;

  /* ---------- palette ---------- */
  const PALETTE = {
    produced: '#2f5fd0',   // คิวผลิตจริง — น้ำเงิน
    order:    '#9fb4dd',   // คิวสั่งผลิต — น้ำเงินอ่อน
    transport:'#15a39b',   // คิวขนส่ง — เขียวน้ำทะเล
    stock:    '#d98a2b',   // สต็อคคงเหลือ — เหลืองอำพัน
    cancel:   '#d65b5b',   // ค้าง-ยกเลิก — แดงนุ่ม
    strength: '#2f5fd0',
    prev:     '#c3cad6',   // ปีก่อน (เทา)
    grid:     '#e8ebf1',
    axis:     '#9aa3b2',
    text:     '#5a6473',
    ink:      '#1f2733',
  };

  /* ---------- number format ---------- */
  function fmt(n, d = 0) {
    if (n === null || n === undefined || isNaN(n)) return '–';
    return Number(n).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
  }
  /* compact label for on-bar text: ≥10,000 → k form, else full */
  function compactNum(n, d = 0) {
    if (n === null || n === undefined || isNaN(n)) return '';
    if (d === 0 && n >= 10000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
    return fmt(n, d);
  }

  /* ---------- measure hook (responsive width) ---------- */
  function useMeasure() {
    const ref = useRef(null);
    const [w, setW] = useState(640);
    useLayoutEffect(() => {
      if (!ref.current) return;
      const el = ref.current;
      const update = () => setW(el.clientWidth || 640);
      update();
      const ro = new ResizeObserver(update);
      ro.observe(el);
      return () => ro.disconnect();
    }, []);
    return [ref, w];
  }

  /* ---------- nice axis ---------- */
  function niceMax(max, ticks = 4) {
    if (max <= 0) return 10;
    const raw = max / ticks;
    const mag = Math.pow(10, Math.floor(Math.log10(raw)));
    const norm = raw / mag;
    let step;
    if (norm <= 1) step = 1; else if (norm <= 2) step = 2; else if (norm <= 2.5) step = 2.5; else if (norm <= 5) step = 5; else step = 10;
    step *= mag;
    return Math.ceil(max / step) * step;
  }
  function axisTicks(min, max, count = 4) {
    const arr = [];
    for (let i = 0; i <= count; i++) arr.push(min + ((max - min) * i) / count);
    return arr;
  }

  /* ---------- tooltip ---------- */
  function Tooltip({ tip }) {
    if (!tip) return null;
    return (
      <div className="chart-tip" style={{ left: tip.x, top: tip.y }}>
        {tip.title && <div className="chart-tip__title">{tip.title}</div>}
        {tip.rows.map((r, i) => (
          <div className="chart-tip__row" key={i}>
            {r.color && <span className="chart-tip__dot" style={{ background: r.color }} />}
            <span className="chart-tip__lbl">{r.label}</span>
            <span className="chart-tip__val">{r.value}</span>
          </div>
        ))}
      </div>
    );
  }

  /* ============================================================
     GroupedBarChart — หลายชุดข้อมูลต่อหมวด
     props: categories[], series:[{key,label,color,data[]}], height, unit, decimals
     ============================================================ */
  function GroupedBarChart({ categories, series, height = 300, unit = '', decimals = 0 }) {
    const [ref, W] = useMeasure();
    const [tip, setTip] = useState(null);
    const pad = { t: 18, r: 14, b: 40, l: 52 };
    const H = height;
    const innerW = Math.max(10, W - pad.l - pad.r);
    const innerH = H - pad.t - pad.b;
    const maxVal = niceMax(Math.max(1, ...series.flatMap(s => s.data.map(v => v || 0))));
    const ticks = axisTicks(0, maxVal, 4);
    const groupW = innerW / categories.length;
    const innerPad = groupW * 0.18;
    const barAreaW = groupW - innerPad * 2;
    const barW = barAreaW / series.length;
    const y = v => pad.t + innerH - (v / maxVal) * innerH;

    return (
      <div className="chart" ref={ref} style={{ position: 'relative' }}>
        <svg width={W} height={H} role="img">
          {ticks.map((t, i) => (
            <g key={i}>
              <line x1={pad.l} x2={W - pad.r} y1={y(t)} y2={y(t)} stroke={PALETTE.grid} />
              <text x={pad.l - 8} y={y(t) + 4} textAnchor="end" className="ax-lbl">{fmt(t)}</text>
            </g>
          ))}
          {categories.map((cat, ci) => {
            const gx = pad.l + ci * groupW + innerPad;
            return (
              <g key={ci}>
                {series.map((s, si) => {
                  const v = s.data[ci] || 0;
                  const bx = gx + si * barW;
                  const bh = (v / maxVal) * innerH;
                  return (
                    <g key={si}>
                      <rect x={bx + 1} y={pad.t + innerH - bh} width={Math.max(0, barW - 2)} height={bh}
                        fill={s.color} rx="2"
                        onMouseMove={e => {
                          const r = ref.current.getBoundingClientRect();
                          setTip({ x: e.clientX - r.left + 12, y: e.clientY - r.top - 10, title: cat,
                            rows: series.map(ss => ({ color: ss.color, label: ss.label, value: fmt(ss.data[ci], decimals) + (unit ? ' ' + unit : '') })) });
                        }}
                        onMouseLeave={() => setTip(null)} />
                      {v > 0 && barW >= 16 && (
                        <text x={bx + barW / 2} y={pad.t + innerH - bh - 5} textAnchor="middle" className="bar-val"
                          fill={s.color} style={{ fontSize: barW < 30 ? '9px' : '10.5px' }}>{compactNum(v, decimals)}</text>
                      )}
                    </g>
                  );
                })}
                <text x={gx + barAreaW / 2} y={H - pad.b + 18} textAnchor="middle" className="ax-lbl">{cat}</text>
              </g>
            );
          })}
        </svg>
        <Tooltip tip={tip} />
      </div>
    );
  }

  /* ============================================================
     BarChart — ชุดเดียว + เส้นเป้าหมาย (optional) + ป้ายค่า
     props: categories[], values[], color, target, targetLabel, height, unit, decimals, valueLabels
     ============================================================ */
  function BarChart({ categories, values, color = PALETTE.produced, target = null, targetLabel = 'เป้าหมาย', height = 280, unit = '', decimals = 0, yMaxOverride = null }) {
    const [ref, W] = useMeasure();
    const [tip, setTip] = useState(null);
    const pad = { t: 18, r: 14, b: 40, l: 52 };
    const H = height;
    const innerW = Math.max(10, W - pad.l - pad.r);
    const innerH = H - pad.t - pad.b;
    const maxData = Math.max(1, ...values.map(v => v || 0), target || 0);
    const maxVal = yMaxOverride || niceMax(maxData);
    const ticks = axisTicks(0, maxVal, 4);
    const bandW = innerW / categories.length;
    const barW = bandW * 0.56;
    const y = v => pad.t + innerH - (v / maxVal) * innerH;

    return (
      <div className="chart" ref={ref} style={{ position: 'relative' }}>
        <svg width={W} height={H} role="img">
          {ticks.map((t, i) => (
            <g key={i}>
              <line x1={pad.l} x2={W - pad.r} y1={y(t)} y2={y(t)} stroke={PALETTE.grid} />
              <text x={pad.l - 8} y={y(t) + 4} textAnchor="end" className="ax-lbl">{fmt(t)}</text>
            </g>
          ))}
          {target != null && (
            <g>
              <line x1={pad.l} x2={W - pad.r} y1={y(target)} y2={y(target)} stroke={PALETTE.cancel} strokeWidth="1.5" strokeDasharray="5 4" />
              <text x={W - pad.r} y={y(target) - 6} textAnchor="end" className="target-lbl" fill={PALETTE.cancel}>{targetLabel} {fmt(target, decimals)}</text>
            </g>
          )}
          {categories.map((cat, ci) => {
            const v = values[ci] || 0;
            const bx = pad.l + ci * bandW + (bandW - barW) / 2;
            const bh = (v / maxVal) * innerH;
            return (
              <g key={ci}>
                <rect x={bx} y={pad.t + innerH - bh} width={barW} height={bh} fill={color} rx="3"
                  onMouseMove={e => { const r = ref.current.getBoundingClientRect(); setTip({ x: e.clientX - r.left + 12, y: e.clientY - r.top - 10, title: cat, rows: [{ color, label: 'ค่า', value: fmt(v, decimals) + (unit ? ' ' + unit : '') }] }); }}
                  onMouseLeave={() => setTip(null)} />
                <text x={bx + barW / 2} y={pad.t + innerH - bh - 6} textAnchor="middle" className="bar-val">{v ? fmt(v, decimals) : ''}</text>
                <text x={pad.l + ci * bandW + bandW / 2} y={H - pad.b + 18} textAnchor="middle" className="ax-lbl">{cat}</text>
              </g>
            );
          })}
        </svg>
        <Tooltip tip={tip} />
      </div>
    );
  }

  /* ============================================================
     LineChart — หลายเส้น + เส้นเป้าหมาย (optional) + จุด hover
     props: categories[], series:[{label,color,data[]}], targets:[{value,color,label}],
            height, unit, decimals, yMin, yMax, area(bool)
     ============================================================ */
  function LineChart({ categories, series, targets = [], height = 300, unit = '', decimals = 0, yMin = null, yMax = null, area = false, showValues = false, dangerBelow = null }) {
    const [ref, W] = useMeasure();
    const [hover, setHover] = useState(null);
    const pad = { t: 20, r: 16, b: 40, l: 52 };
    const H = height;
    const innerW = Math.max(10, W - pad.l - pad.r);
    const innerH = H - pad.t - pad.b;
    const allVals = series.flatMap(s => s.data.filter(v => v != null)).concat(targets.map(t => t.value));
    let lo = yMin != null ? yMin : Math.min(...allVals);
    let hi = yMax != null ? yMax : Math.max(...allVals);
    if (yMin == null) lo = Math.floor(lo * 0.96);
    if (yMax == null) hi = Math.ceil(hi * 1.04);
    if (hi === lo) hi = lo + 1;
    const ticks = axisTicks(lo, hi, 4);
    const x = i => pad.l + (categories.length === 1 ? innerW / 2 : (i / (categories.length - 1)) * innerW);
    const y = v => pad.t + innerH - ((v - lo) / (hi - lo)) * innerH;

    const linePath = data => data.map((v, i) => (v == null ? null : `${i === 0 || data[i - 1] == null ? 'M' : 'L'}${x(i)},${y(v)}`)).filter(Boolean).join(' ');

    return (
      <div className="chart" ref={ref} style={{ position: 'relative' }}
        onMouseLeave={() => setHover(null)}
        onMouseMove={e => {
          const r = ref.current.getBoundingClientRect();
          const mx = e.clientX - r.left;
          let idx = Math.round(((mx - pad.l) / innerW) * (categories.length - 1));
          idx = Math.max(0, Math.min(categories.length - 1, idx));
          setHover(idx);
        }}>
        <svg width={W} height={H} role="img">
          {ticks.map((t, i) => (
            <g key={i}>
              <line x1={pad.l} x2={W - pad.r} y1={y(t)} y2={y(t)} stroke={PALETTE.grid} />
              <text x={pad.l - 8} y={y(t) + 4} textAnchor="end" className="ax-lbl">{fmt(t, decimals)}</text>
            </g>
          ))}
          {targets.map((t, i) => (
            <g key={'t' + i}>
              <line x1={pad.l} x2={W - pad.r} y1={y(t.value)} y2={y(t.value)} stroke={t.color} strokeWidth="1.5" strokeDasharray="5 4" opacity="0.8" />
              <text x={W - pad.r} y={y(t.value) - 5} textAnchor="end" className="target-lbl" fill={t.color}>{t.label} {fmt(t.value, decimals)}</text>
            </g>
          ))}
          {area && series.length === 1 && (
            <path d={`${linePath(series[0].data)} L${x(categories.length - 1)},${pad.t + innerH} L${x(0)},${pad.t + innerH} Z`} fill={series[0].color} opacity="0.10" />
          )}
          {series.map((s, si) => (
            <g key={si}>
              <path d={linePath(s.data)} fill="none" stroke={s.color} strokeWidth="2.4" strokeLinejoin="round" strokeLinecap="round" />
              {showValues && s.data.map((v, i) => v == null ? null : (
                <text key={'vl' + i} x={x(i)} y={y(v) - 11} textAnchor="middle" className="bar-val"
                  fill={dangerBelow != null && v < dangerBelow ? PALETTE.cancel : s.color}>{fmt(v, decimals)}</text>
              ))}
              {s.data.map((v, i) => v == null ? null : (
                <circle key={i} cx={x(i)} cy={y(v)} r={hover === i ? 5 : (dangerBelow != null && v < dangerBelow ? 4 : 3)} fill="#fff"
                  stroke={dangerBelow != null && v < dangerBelow ? PALETTE.cancel : s.color} strokeWidth="2" />
              ))}
            </g>
          ))}
          {hover != null && (
            <line x1={x(hover)} x2={x(hover)} y1={pad.t} y2={pad.t + innerH} stroke={PALETTE.axis} strokeDasharray="3 3" opacity="0.5" />
          )}
          {categories.map((cat, ci) => (
            <text key={ci} x={x(ci)} y={H - pad.b + 18} textAnchor="middle" className="ax-lbl">{cat}</text>
          ))}
        </svg>
        {hover != null && (
          <Tooltip tip={{
            x: Math.min(x(hover) + 12, W - 150), y: pad.t + 4, title: categories[hover],
            rows: series.map(s => ({ color: s.color, label: s.label, value: s.data[hover] == null ? '–' : fmt(s.data[hover], decimals) + (unit ? ' ' + unit : '') })),
          }} />
        )}
      </div>
    );
  }

  /* ============================================================
     DonutChart — สัดส่วน
     props: segments:[{label,value,color}], size, centerLabel, centerValue
     ============================================================ */
  function DonutChart({ segments, size = 180, thickness = 30, centerLabel = '', centerValue = '' }) {
    const [tip, setTip] = useState(null);
    const ref = useRef(null);
    const total = segments.reduce((a, s) => a + s.value, 0) || 1;
    const r = size / 2;
    const ir = r - thickness;
    let acc = -Math.PI / 2;
    const arcs = segments.map(s => {
      const ang = (s.value / total) * Math.PI * 2;
      const a0 = acc, a1 = acc + ang;
      acc = a1;
      const large = ang > Math.PI ? 1 : 0;
      const p = (rad, a) => [r + rad * Math.cos(a), r + rad * Math.sin(a)];
      const [x0, y0] = p(r, a0), [x1, y1] = p(r, a1);
      const [xi1, yi1] = p(ir, a1), [xi0, yi0] = p(ir, a0);
      return { ...s, d: `M${x0},${y0} A${r},${r} 0 ${large} 1 ${x1},${y1} L${xi1},${yi1} A${ir},${ir} 0 ${large} 0 ${xi0},${yi0} Z` };
    });
    return (
      <div className="donut" ref={ref} style={{ position: 'relative', width: size, height: size }}>
        <svg width={size} height={size}>
          {arcs.map((a, i) => (
            <path key={i} d={a.d} fill={a.color} stroke="#fff" strokeWidth="1.5"
              onMouseMove={e => { const rr = ref.current.getBoundingClientRect(); setTip({ x: e.clientX - rr.left + 10, y: e.clientY - rr.top, rows: [{ color: a.color, label: a.label, value: fmt(a.value) + ' (' + ((a.value / total) * 100).toFixed(0) + '%)' }] }); }}
              onMouseLeave={() => setTip(null)} />
          ))}
          <text x={r} y={r - 4} textAnchor="middle" className="donut-val">{centerValue}</text>
          <text x={r} y={r + 16} textAnchor="middle" className="donut-lbl">{centerLabel}</text>
        </svg>
        <Tooltip tip={tip} />
      </div>
    );
  }

  /* ============================================================
     HBarChart — แท่งแนวนอน (สำหรับสาเหตุ)
     props: items:[{label,value}], color, unit
     ============================================================ */
  function HBarChart({ items, color = PALETTE.cancel, unit = 'แพ' }) {
    const max = Math.max(1, ...items.map(i => i.value));
    return (
      <div className="hbar">
        {items.map((it, i) => (
          <div className="hbar__row" key={i}>
            <div className="hbar__lbl" title={it.label}>{it.label}</div>
            <div className="hbar__track">
              <div className="hbar__fill" style={{ width: `${(it.value / max) * 100}%`, background: color }} />
            </div>
            <div className="hbar__val">{it.value ? fmt(it.value) : '–'}</div>
          </div>
        ))}
      </div>
    );
  }

  Object.assign(window, { useMeasure, fmt, compactNum, PALETTE, Tooltip, GroupedBarChart, BarChart, LineChart, DonutChart, HBarChart });
  </script>

  <!-- ============================================================
       app — แดชบอร์ดรายงานการผลิตเสาเข็มคอนกรีตอัดแรง
       ============================================================ -->
  <script type="text/babel">
  const D = window.REPORT_DATA;
  const M = D.MONTHS_TH;

  /* ---------- helpers ---------- */
  const CAP = D.capacity; // { queuePerDay:170, raftPerDay:12 }
  /* % การผลิต = ค่าสูงสุดระหว่างเกณฑ์คิว และเกณฑ์แพ
     อิงวันที่ผลิตจริง: 100% = (170 คิว หรือ 12 แพ) × จำนวนวันที่ผลิตจริง */
  function computePct(mo) {
    const days = mo.days || 1;
    const pctQ = (mo.produced / (CAP.queuePerDay * days)) * 100;
    const pctR = (mo.raftProduced / (CAP.raftPerDay * days)) * 100;
    return pctQ >= pctR
      ? { pct: pctQ, basis: 'คิว' }
      : { pct: pctR, basis: 'แพ' };
  }
  const yearData = y => D.years[y];
  const byMonth = (y, field) => {
    const arr = new Array(12).fill(null);
    yearData(y).months.forEach(mo => { arr[mo.m - 1] = field === 'pct' ? computePct(mo).pct : mo[field]; });
    return arr;
  };
  const sum = a => a.reduce((x, v) => x + (v || 0), 0);
  const avg = a => { const f = a.filter(v => v != null); return f.length ? f.reduce((x, v) => x + v, 0) / f.length : 0; };
  const monthsPresent = y => yearData(y).months.map(mo => mo.m); // [1,2,3,4]
  const CAUSE_COLORS = ['#2f5fd0', '#d65b5b', '#d98a2b', '#15a39b', '#7b61c4', '#5a8f3c', '#c44d8f', '#4a6b8a', '#b07b3a', '#8a8f9a'];

  /* ---------- small UI ---------- */
  function Legend({ items }) {
    return (
      <div className="legend">
        {items.map((it, i) => (
          <span className="legend__item" key={i}>
            <span className="legend__sw" style={{ background: it.color, ...(it.dash ? { background: 'none', borderTop: `2.5px dashed ${it.color}`, height: 0, width: 16, borderRadius: 0 } : {}) }} />
            {it.label}
          </span>
        ))}
      </div>
    );
  }

  function KpiCard({ label, value, unit, sub, accent, delta }) {
    return (
      <div className="kpi">
        <div className="kpi__label">{label}</div>
        <div className="kpi__value" style={accent ? { color: accent } : {}}>
          {value}<span className="kpi__unit">{unit}</span>
        </div>
        {sub && <div className="kpi__sub">{sub}</div>}
        {delta && (
          <div className={`kpi__delta ${delta.dir > 0 ? 'up' : delta.dir < 0 ? 'down' : ''}`}>
            {delta.dir > 0 ? '▲' : delta.dir < 0 ? '▼' : '–'} {delta.text}
          </div>
        )}
      </div>
    );
  }

  function ChartCard({ title, subtitle, right, children, span }) {
    return (
      <section className={`card ${span ? 'card--' + span : ''}`}>
        <header className="card__head">
          <div>
            <h3 className="card__title">{title}</h3>
            {subtitle && <p className="card__sub">{subtitle}</p>}
          </div>
          {right && <div className="card__right">{right}</div>}
        </header>
        <div className="card__body">{children}</div>
      </section>
    );
  }

  function Segmented({ options, value, onChange }) {
    return (
      <div className="seg">
        {options.map(o => (
          <button key={o.value} className={`seg__btn ${value === o.value ? 'is-active' : ''}`} onClick={() => onChange(o.value)}>{o.label}</button>
        ))}
      </div>
    );
  }

  /* การ์ดเทียบคิวผลิต–ขนส่ง ของเดือนล่าสุด พร้อมป้ายสรุป */
  /* การ์ดสถานะสต็อคปัจจุบัน + แจ้งเตือนอัตโนมัติตามเกณฑ์ */
  function stockStatus(v) {
    if (v >= 4000) return { text: 'สต็อคควรลด', emoji: '🚨', cls: 'high', hint: 'สต็อคสูง — ควรเร่งระบาย/ลดการผลิต' };
    if (v < 3500) return { text: 'ควรสต็อคสินค้าเพิ่ม', emoji: '📥', cls: 'low', hint: 'สต็อคต่ำ — ควรเพิ่มการผลิตเข้าสต็อค' };
    return { text: 'สต็อคปกติ', emoji: '✅', cls: 'ok', hint: 'อยู่ในเกณฑ์ที่เหมาะสม' };
  }
  function StockStatusCard({ current, prev, label, year }) {
    const st = stockStatus(current);
    const delta = prev != null ? current - prev : null;
    return (
      <section className={`card card--full stockcard stockcard--${st.cls}`}>
        <div className="stockcard__body">
          <div className="stockcard__main">
            <div className="stockcard__label">สต็อคคิวคงเหลือปัจจุบัน</div>
            <div className="stockcard__num">{fmt(current, 0)}<span className="stockcard__unit"> m³</span></div>
            <div className="stockcard__when">ณ เดือน{label} {year}</div>
          </div>
          {delta != null && (
            <div className={`stockcard__delta ${delta >= 0 ? 'up' : 'down'}`}>
              <span className="stockcard__arrow">{delta >= 0 ? '▲' : '▼'}</span>
              <div>
                <div className="stockcard__deltanum">{(delta >= 0 ? '+' : '') + fmt(delta, 0)} m³</div>
                <div className="stockcard__deltalbl">เทียบเดือนก่อน</div>
              </div>
            </div>
          )}
          <div className="stockcard__status">
            <div className={`stockbadge stockbadge--${st.cls}`}>
              <span className="stockbadge__emoji">{st.emoji}</span>
              <span>{st.text}</span>
            </div>
            <div className="stockcard__hint">{st.hint}</div>
          </div>
        </div>
        <div className="stockcard__scale">
          <span className="stockcard__seg stockcard__seg--low">{'< 3,500 ควรเพิ่ม'}</span>
          <span className="stockcard__seg stockcard__seg--ok">3,500–3,999 ปกติ</span>
          <span className="stockcard__seg stockcard__seg--high">{'≥ 4,000 ควรลด'}</span>
        </div>
      </section>
    );
  }

  function LatestCompareCard({ month, label, year }) {
    const prod = month.produced, trans = month.transport;
    const diff = prod - trans;
    const prodMore = diff >= 0;
    const max = Math.max(prod, trans) || 1;
    const ratio = (trans / (prod || 1)) * 100;
    return (
      <section className="card card--full latest">
        <header className="card__head">
          <div>
            <h3 className="card__title">คิวผลิต–ขนส่ง เดือนล่าสุด</h3>
            <p className="card__sub">ข้อมูลเดือน{label} {year}</p>
          </div>
          <div className={`verdict ${prodMore ? 'verdict--prod' : 'verdict--trans'}`}>
            <span className="verdict__arrow">{prodMore ? '▲' : '▼'}</span>
            <span>{prodMore ? 'ผลิตมากกว่าขนส่ง' : 'ขนส่งมากกว่าผลิต'} {fmt(Math.abs(diff), 0)} m³</span>
          </div>
        </header>
        <div className="card__body latest__body">
          <div className="latest__stat">
            <span className="latest__dot" style={{ background: PALETTE.produced }} />
            <div>
              <div className="latest__lbl">คิวผลิตจริง</div>
              <div className="latest__num" style={{ color: PALETTE.produced }}>{fmt(prod, 0)}<span> m³</span></div>
            </div>
          </div>
          <div className="latest__bars">
            <div className="latest__bar"><div className="latest__fill" style={{ width: (prod / max * 100) + '%', background: PALETTE.produced }} /></div>
            <div className="latest__bar"><div className="latest__fill" style={{ width: (trans / max * 100) + '%', background: PALETTE.transport }} /></div>
            <div className="latest__ratio">ขนส่งคิดเป็น {fmt(ratio, 0)}% ของที่ผลิต</div>
          </div>
          <div className="latest__stat latest__stat--r">
            <div>
              <div className="latest__lbl">คิวขนส่ง</div>
              <div className="latest__num" style={{ color: PALETTE.transport }}>{fmt(trans, 0)}<span> m³</span></div>
            </div>
            <span className="latest__dot" style={{ background: PALETTE.transport }} />
          </div>
        </div>
      </section>
    );
  }

  /* ============================================================
     TAB 1 — ภาพรวมการผลิต
     ============================================================ */
  function OverviewTab({ year }) {
    const yd = yearData(year);
    const cats = monthsPresent(year).map(m => M[m - 1]);
    const produced = yd.months.map(mo => mo.produced);
    const transport = yd.months.map(mo => mo.transport);
    const order = yd.months.map(mo => mo.order);
    const stock = yd.months.map(mo => mo.stock);
    const pctInfo = yd.months.map(mo => computePct(mo));
    const pct = pctInfo.map(p => p.pct);
    const raftCancel = yd.months.map(mo => mo.raftCancel);

    const totalProduced = sum(produced);
    const totalTransport = sum(transport);
    const latestStock = stock[stock.length - 1];
    const avgPct = avg(pct);
    const totalRaftCancel = sum(raftCancel);
    const net = totalProduced - totalTransport;

    // causes (เฉพาะปีที่มีข้อมูล)
    let causeSegments = null, causeItems = null, totalCauses = 0;
    if (yd.causes) {
      const totals = D.causeLabels.map((_, i) => monthsPresent(year).reduce((a, m) => a + (yd.causes[m] ? yd.causes[m][i] : 0), 0));
      totalCauses = sum(totals);
      const paired = D.causeLabels.map((l, i) => ({ label: l, value: totals[i], color: CAUSE_COLORS[i] }))
        .filter(x => x.value > 0).sort((a, b) => b.value - a.value);
      causeItems = paired;
      causeSegments = paired;
    }

    return (
      <div className="grid">
        <div className="kpi-row">
          <KpiCard label="คิวผลิตจริงรวม" value={fmt(totalProduced)} unit=" m³" sub={`เฉลี่ย ${fmt(totalProduced / yd.months[yd.months.length - 1].m)} m³/เดือน`} accent={PALETTE.produced} />
          <KpiCard label="คิวขนส่งรวม" value={fmt(totalTransport)} unit=" m³" sub={`เฉลี่ย ${fmt(avg(transport))} m³/เดือน`} accent={PALETTE.transport} />
          <KpiCard label="ผลิต − ขนส่ง (สุทธิ)" value={(net >= 0 ? '+' : '') + fmt(net)} unit=" m³" sub={net >= 0 ? 'ผลิตมากกว่าขนส่ง' : 'ขนส่งมากกว่าผลิต'} accent={net >= 0 ? PALETTE.produced : PALETTE.cancel} />
          <KpiCard label="สต็อคคงเหลือล่าสุด" value={fmt(latestStock)} unit=" m³" sub={`ณ เดือน${cats[cats.length - 1]}`} accent={PALETTE.stock} />
          <KpiCard label="% ผลิตได้จริงเฉลี่ย" value={fmt(avgPct, 1)} unit="%" sub={`แพค้าง-ยกเลิกรวม ${fmt(totalRaftCancel)} แพ`} accent={avgPct >= 90 ? '#5a8f3c' : PALETTE.cancel} />
        </div>

        <LatestCompareCard month={yd.months[yd.months.length - 1]} label={cats[cats.length - 1]} year={year} />

        <ChartCard title="เทียบคิวผลิตจริงกับคิวขนส่งรายเดือน" subtitle="หน่วย: ลูกบาศก์เมตร (m³) ของคอนกรีต"
          right={<Legend items={[{ label: 'คิวผลิตจริง', color: PALETTE.produced }, { label: 'คิวขนส่ง', color: PALETTE.transport }]} />} span="wide">
          <GroupedBarChart categories={cats} unit="m³" decimals={0}
            series={[{ key: 'p', label: 'คิวผลิตจริง', color: PALETTE.produced, data: produced }, { key: 't', label: 'คิวขนส่ง', color: PALETTE.transport, data: transport }]} height={320} />
        </ChartCard>

        <StockStatusCard current={latestStock} prev={stock.length > 1 ? stock[stock.length - 2] : null} label={cats[cats.length - 1]} year={year} />

        <ChartCard title="สต็อคคิวคงเหลือรายเดือน" subtitle="ปริมาณคงเหลือปลายเดือน (m³)">
          <LineChart categories={cats} unit="m³" area showValues
            series={[{ label: 'สต็อคคงเหลือ', color: PALETTE.stock, data: stock }]} height={260} />
        </ChartCard>

        <ChartCard title="เปอร์เซ็นต์การผลิตได้จริงรายเดือน" subtitle={`100% = ${CAP.queuePerDay} คิว/วัน หรือ ${CAP.raftPerDay} แพ/วัน (เลือกค่าที่มากกว่า)`}>
          <BarChart categories={cats} values={pct} color={PALETTE.produced} target={100} targetLabel="เป้า" unit="%" decimals={1} yMaxOverride={110} height={260} />
        </ChartCard>

        {causeSegments ? (
          <ChartCard title="สาเหตุจำนวนแพ ค้าง-ยกเลิก" subtitle={`รวมทั้งหมด ${fmt(totalCauses)} แพ ในปี ${year}`} span="wide"
            right={<Legend items={[{ label: 'จำนวนแพ', color: PALETTE.cancel }]} />}>
            <div className="cause-split">
              <div className="cause-split__bars"><HBarChart items={causeItems} color={PALETTE.cancel} /></div>
              <div className="cause-split__donut">
                <DonutChart segments={causeSegments} size={170} thickness={28} centerValue={fmt(totalCauses)} centerLabel="แพรวม" />
              </div>
            </div>
          </ChartCard>
        ) : (
          <ChartCard title="สาเหตุจำนวนแพ ค้าง-ยกเลิก" subtitle={`ปี ${year}`} span="wide">
            <div className="empty">ยังไม่มีข้อมูลสาเหตุสำหรับปีนี้ (ข้อมูลตัวอย่าง)</div>
          </ChartCard>
        )}

        <ChartCard title="ตารางสรุปการผลิตรายเดือน" subtitle={`ปี ${year}`} span="full">
          <div className="table-wrap">
            <table className="dt">
              <thead>
                <tr>
                  <th className="ta-l">เดือน</th>
                  <th>คิวผลิตจริง</th><th>% ผลิต</th>
                  <th>วันผลิต</th><th>เฉลี่ยคิว/วัน</th><th>คิวขนส่ง</th><th>สต็อคคงเหลือ</th>
                  <th>แพสั่ง</th><th>แพผลิต</th><th>แพค้าง</th>
                </tr>
              </thead>
              <tbody>
                {yd.months.map(mo => (
                  <tr key={mo.m}>
                    <td className="ta-l strong">{M[mo.m - 1]} {year}</td>
                    <td className="strong">{fmt(mo.produced, 0)}</td>
                    <td>
                      <span className={`pill ${computePct(mo).pct >= 90 ? 'pill--ok' : 'pill--warn'}`}>{fmt(computePct(mo).pct, 1)}%</span>
                      <span className="basis-tag">เกณฑ์{computePct(mo).basis}</span>
                    </td>
                    <td>{mo.days}</td>
                    <td>{fmt(mo.perDay, 1)}</td>
                    <td>{fmt(mo.transport, 0)}</td>
                    <td>{fmt(mo.stock, 0)}</td>
                    <td>{fmt(mo.raftOrder, 0)}</td>
                    <td>{fmt(mo.raftProduced, 0)}</td>
                    <td>{fmt(mo.raftCancel, 0)}</td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr>
                  <td className="ta-l">รวม / เฉลี่ย</td>
                  <td className="strong">{fmt(totalProduced)}</td>
                  <td>{fmt(avgPct, 1)}%</td>
                  <td>{sum(yd.months.map(m => m.days))}</td>
                  <td>{fmt(avg(yd.months.map(m => m.perDay)), 1)}</td>
                  <td>{fmt(totalTransport)}</td><td>{fmt(latestStock)}</td>
                  <td>{fmt(sum(yd.months.map(m => m.raftOrder)))}</td>
                  <td>{fmt(sum(yd.months.map(m => m.raftProduced)))}</td>
                  <td>{fmt(totalRaftCancel)}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </ChartCard>
      </div>
    );
  }

  /* ============================================================
     TAB 2 — เทียบรายปี
     ============================================================ */
  const YEAR_COLORS = ['#c3cad6', '#2f5fd0', '#15a39b', '#d98a2b', '#7b61c4', '#d65b5b'];
  const AVAILABLE_YEARS = Object.keys(D.years).map(Number).sort((a, b) => a - b);
  const yearColor = y => YEAR_COLORS[AVAILABLE_YEARS.indexOf(y) % YEAR_COLORS.length];

  function YearCompareTab() {
    const [metric, setMetric] = useState('produced');
    const [selected, setSelected] = useState(AVAILABLE_YEARS);
    const toggleYear = y => setSelected(prev => prev.includes(y) ? (prev.length === 1 ? prev : prev.filter(x => x !== y)) : [...prev, y]);
    const metricMap = {
      produced: { label: 'คิวผลิตจริง', unit: 'm³', dec: 0 },
      transport: { label: 'คิวขนส่ง', unit: 'm³', dec: 0 },
      pct: { label: '% ผลิตได้จริง', unit: '%', dec: 1 },
    };
    const cfg = metricMap[metric];
    const sel = [...selected].sort((a, b) => a - b);
    const seriesData = sel.map(y => {
      const arr = byMonth(y, metric);
      const total = metric === 'pct' ? avg(arr.filter(v => v != null)) : sum(arr);
      return { year: y, color: yearColor(y), data: arr, total, real: yearData(y).real };
    });
    // YoY เมื่อเลือก 2 ปี (เทียบเฉพาะช่วงเดือนที่ปีล่าสุดมีข้อมูล)
    let yoy = null;
    if (sel.length === 2) {
      const [ya, yb] = sel;
      const aArr = byMonth(ya, metric), bArr = byMonth(yb, metric);
      const span = monthsPresent(yb);
      const aSpan = metric === 'pct' ? avg(span.map(m => aArr[m - 1])) : sum(span.map(m => aArr[m - 1]));
      const bSpan = metric === 'pct' ? avg(span.map(m => bArr[m - 1]).filter(v => v != null)) : sum(span.map(m => bArr[m - 1]));
      const d = bSpan - aSpan;
      yoy = { ya, yb, d, pct: aSpan ? (d / aSpan) * 100 : 0, spanLen: span.length };
    }
    const cardCount = Math.min(seriesData.length + (yoy ? 1 : 0), 5);

    return (
      <div className="grid">
        <div className="yc-head">
          <Segmented value={metric} onChange={setMetric} options={[
            { value: 'produced', label: 'คิวผลิต' }, { value: 'transport', label: 'คิวขนส่ง' }, { value: 'pct', label: '% ผลิต' }]} />
          <div className="yearchips">
            <span className="yearchips__lbl">เลือกปีที่เทียบ</span>
            {AVAILABLE_YEARS.map(y => {
              const on = selected.includes(y);
              return (
                <button key={y} className={`yearchip ${on ? 'is-on' : ''}`} onClick={() => toggleYear(y)}>
                  <span className="yearchip__sw" style={{ background: on ? yearColor(y) : '#cdd3dc' }} />
                  {y}{!yearData(y).real ? ' *' : ''}
                </button>
              );
            })}
          </div>
        </div>

        <div className="kpi-row" style={{ gridTemplateColumns: `repeat(${cardCount}, 1fr)` }}>
          {seriesData.map(s => (
            <KpiCard key={s.year} label={`${cfg.label} • ปี ${s.year}`} value={fmt(s.total, cfg.dec)} unit={' ' + cfg.unit}
              sub={s.real ? `${monthsPresent(s.year).length} เดือนที่มีข้อมูล` : 'ทั้งปี (ข้อมูลตัวอย่าง)'}
              accent={s.color === '#c3cad6' ? '#8a93a3' : s.color} />
          ))}
          {yoy && (
            <KpiCard label={`เทียบ ${yoy.ya} → ${yoy.yb} (YoY)`} value={(yoy.d >= 0 ? '+' : '') + fmt(yoy.d, cfg.dec)} unit={' ' + cfg.unit}
              sub={`เทียบ ${yoy.spanLen} เดือนแรกที่ตรงกัน`}
              delta={{ dir: Math.sign(yoy.d), text: `${yoy.pct >= 0 ? '+' : ''}${yoy.pct.toFixed(1)}%` }}
              accent={yoy.d >= 0 ? '#5a8f3c' : PALETTE.cancel} />
          )}
        </div>

        <ChartCard title={`เทียบ${cfg.label}ประจำเดือนของแต่ละปี`} subtitle={`${sel.map(y => 'ปี ' + y).join(' · ')} • หน่วย: ${cfg.unit}`} span="full"
          right={<Legend items={seriesData.map(s => ({ label: `ปี ${s.year}`, color: s.color }))} />}>
          <GroupedBarChart categories={M} unit={cfg.unit} decimals={cfg.dec}
            series={seriesData.map(s => ({ key: String(s.year), label: `ปี ${s.year}`, color: s.color, data: s.data.map(v => v || 0) }))} height={360} />
        </ChartCard>

        <ChartCard title="ตารางเทียบรายเดือน" subtitle={`${cfg.label} (${cfg.unit})`} span="full">
          <div className="table-wrap">
            <table className="dt">
              <thead>
                <tr><th className="ta-l">ปี \ เดือน</th>{M.map((m, i) => <th key={i}>{m}</th>)}<th>รวม/เฉลี่ย</th></tr>
              </thead>
              <tbody>
                {seriesData.map(s => (
                  <tr key={s.year}>
                    <td className="ta-l strong"><span className="td-sw" style={{ background: s.color }} />ปี {s.year}</td>
                    {s.data.map((v, i) => <td key={i}>{v == null ? '–' : fmt(v, cfg.dec)}</td>)}
                    <td className="strong">{fmt(s.total, cfg.dec)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {seriesData.some(s => !s.real) && <p className="note">* ปีที่มีเครื่องหมาย * เป็นข้อมูลตัวอย่าง — แทนด้วยตัวเลขจริงได้ในไฟล์ data.js</p>}
        </ChartCard>
      </div>
    );
  }

  /* ============================================================
     TAB 3 — คุณภาพ & วัตถุดิบ (ค่าเฉลี่ยทุก 10 วัน)
     ============================================================ */
  function QualityTab({ year }) {
    const yd = yearData(year);
    if (!yd.decades) {
      return <div className="grid"><ChartCard title="ค่าเฉลี่ยทุก 10 วัน" subtitle={`ปี ${year}`} span="full"><div className="empty">ยังไม่มีข้อมูลราย 10 วันสำหรับปีนี้ — เลือกปี 2569 เพื่อดูข้อมูลจริง</div></ChartCard></div>;
    }
    const dec = yd.decades;
    const labels = dec.map(d => d.label);
    const strength = dec.map(d => d.strength);
    const cementTotal = dec.map(d => d.cementTotal);
    const cementBig = dec.map(d => d.cementBig);
    const cementI18 = dec.map(d => d.cementI18);
    const rock34 = dec.map(d => d.rock34);
    const rock1 = dec.map(d => d.rock1);
    const sand = dec.map(d => d.sand);
    const T = D.mixTarget;

    return (
      <div className="grid">
        <div className="kpi-row kpi-row--5">
          <KpiCard label="Strength เฉลี่ย" value={fmt(avg(strength), 0)} unit=" ksc" sub={`ต่ำกว่าเกณฑ์ 450 จำนวน ${strength.filter(v => v != null && v < 450).length} ช่วง`} accent={strength.some(v => v != null && v < 450) ? PALETTE.cancel : PALETTE.strength} />
          <KpiCard label="ปูนเฉลี่ย (ทั้งหมด)" value={fmt(avg(cementTotal), 1)} unit=" kg/m³" sub="ค่าเฉลี่ยใช้ปูนรวม" accent={PALETTE.produced} />
          <KpiCard label="หิน 3/4″ เฉลี่ย" value={fmt(avg(rock34), 0)} unit=" kg/m³" sub={`สูตร ${T.rock34}`} accent={PALETTE.transport} />
          <KpiCard label="หิน 1″ เฉลี่ย" value={fmt(avg(rock1), 0)} unit=" kg/m³" sub={`สูตร ${T.rock1}`} accent="#7b61c4" />
          <KpiCard label="ทรายเฉลี่ย" value={fmt(avg(sand), 0)} unit=" kg/m³" sub={`สูตร ${T.sand}`} accent={PALETTE.stock} />
        </div>

        <ChartCard title="ค่าเฉลี่ย Strength ทุก 10 วัน" subtitle={`หน่วย: ksc • เส้นประแดง = เกณฑ์ขั้นต่ำ 450 • เส้นประเขียว = ค่าเฉลี่ย ${fmt(avg(strength), 0)}`} span="full"
          right={<Legend items={[{ label: 'Strength', color: PALETTE.strength }, { label: 'เกณฑ์ขั้นต่ำ 450', color: PALETTE.cancel, dash: true }, { label: 'ค่าเฉลี่ย', color: '#3f9a4f', dash: true }]} />}>
          <LineChart categories={labels} unit="ksc" decimals={0} showValues yMin={420} dangerBelow={450}
            series={[{ label: 'Strength', color: PALETTE.strength, data: strength }]}
            targets={[{ value: 450, color: PALETTE.cancel, label: 'ขั้นต่ำ' }, { value: Math.round(avg(strength)), color: '#3f9a4f', label: 'เฉลี่ย' }]} height={300} />
        </ChartCard>

        <ChartCard title="ค่าเฉลี่ยใช้ปูนทุก 10 วัน" subtitle="หน่วย: kg/m³ • แยกตามชนิดเสา" span="wide"
          right={<Legend items={[{ label: 'ใช้ปูนทั้งหมด', color: PALETTE.produced }, { label: 'เสาใหญ่', color: PALETTE.transport }, { label: 'I18', color: '#7b61c4' }]} />}>
          <LineChart categories={labels} unit="kg/m³" decimals={1}
            series={[
              { label: 'ใช้ปูนทั้งหมด', color: PALETTE.produced, data: cementTotal },
              { label: 'เสาใหญ่', color: PALETTE.transport, data: cementBig },
              { label: 'I18', color: '#7b61c4', data: cementI18 },
            ]} height={300} />
        </ChartCard>

        <ChartCard title="ค่าเฉลี่ยใช้หิน-ทรายทุก 10 วัน" subtitle="หน่วย: kg/m³ • เส้นประ = ค่าสูตร (mix design)" span="wide"
          right={<Legend items={[{ label: 'หิน 3/4″', color: PALETTE.transport }, { label: 'หิน 1″', color: '#7b61c4' }, { label: 'ทราย', color: PALETTE.stock }]} />}>
          <LineChart categories={labels} unit="kg/m³" decimals={0} yMin={250} yMax={1000}
            series={[
              { label: 'หิน 3/4″', color: PALETTE.transport, data: rock34 },
              { label: 'หิน 1″', color: '#7b61c4', data: rock1 },
              { label: 'ทราย', color: PALETTE.stock, data: sand },
            ]}
            targets={[
              { value: T.rock34, color: PALETTE.transport, label: 'สูตรหิน3/4″' },
              { value: T.sand, color: PALETTE.stock, label: 'สูตรทราย' },
              { value: T.rock1, color: '#7b61c4', label: 'สูตรหิน1″' },
            ]} height={320} />
        </ChartCard>

        <ChartCard title="ตารางค่าเฉลี่ยทุก 10 วัน" subtitle={`ปี ${year}`} span="full">
          <div className="table-wrap">
            <table className="dt">
              <thead>
                <tr><th className="ta-l">ช่วง 10 วัน</th><th>Strength (ksc)</th><th>ปูนทั้งหมด</th><th>ปูนเสาใหญ่</th><th>ปูน I18</th><th>หิน 3/4″</th><th>หิน 1″</th><th>ทราย</th></tr>
              </thead>
              <tbody>
                {dec.map((d, i) => (
                  <tr key={i}>
                    <td className="ta-l strong">{d.label}</td>
                    <td>{fmt(d.strength, 0)}</td>
                    <td>{fmt(d.cementTotal, 1)}</td>
                    <td>{fmt(d.cementBig, 1)}</td>
                    <td>{fmt(d.cementI18, 1)}</td>
                    <td>{fmt(d.rock34, 0)}</td>
                    <td>{fmt(d.rock1, 0)}</td>
                    <td>{fmt(d.sand, 0)}</td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr>
                  <td className="ta-l">ค่าเฉลี่ย</td>
                  <td>{fmt(avg(strength), 0)}</td><td>{fmt(avg(cementTotal), 1)}</td><td>{fmt(avg(cementBig), 1)}</td>
                  <td>{fmt(avg(cementI18), 1)}</td><td>{fmt(avg(rock34), 0)}</td><td>{fmt(avg(rock1), 0)}</td><td>{fmt(avg(sand), 0)}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </ChartCard>
      </div>
    );
  }

  /* ============================================================
     APP shell
     ============================================================ */
  function App() {
    const [tab, setTab] = useState('overview');
    const [year, setYear] = useState(2569);
    const tabs = [
      { id: 'overview', label: 'ภาพรวมการผลิต' },
      { id: 'compare', label: 'เทียบรายปี' },
      { id: 'quality', label: 'คุณภาพ & วัตถุดิบ' },
    ];
    const showYearPicker = tab !== 'compare';

    return (
      <div className="app">
        <header className="topbar">
          <div className="topbar__brand">
            <div className="topbar__mark" aria-hidden="true">
              <svg width="26" height="26" viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="20" rx="1" fill="#fff" opacity="0.95" /><rect x="3" y="6" width="4" height="16" rx="1" fill="#fff" opacity="0.55" /><rect x="17" y="6" width="4" height="16" rx="1" fill="#fff" opacity="0.55" /></svg>
            </div>
            <div>
              <h1 className="topbar__title">รายงานการผลิตเสาเข็มคอนกรีตอัดแรง</h1>
              <p className="topbar__sub">Prestressed Concrete Pile — Production &amp; Inventory Report</p>
            </div>
          </div>
          <div className="topbar__actions">
            {showYearPicker && (
              <div className="yearpick">
                <span className="yearpick__lbl">ปี</span>
                <Segmented value={year} onChange={setYear} options={[{ value: 2568, label: '2568' }, { value: 2569, label: '2569' }]} />
                {!yearData(year).real && <span className="badge-sample">ข้อมูลตัวอย่าง</span>}
              </div>
            )}
          </div>
        </header>

        <nav className="tabs">
          {tabs.map(t => (
            <button key={t.id} className={`tabs__btn ${tab === t.id ? 'is-active' : ''}`} onClick={() => setTab(t.id)}>{t.label}</button>
          ))}
        </nav>

        <main className="content">
          {tab === 'overview' && <OverviewTab year={year} />}
          {tab === 'compare' && <YearCompareTab />}
          {tab === 'quality' && <QualityTab year={year} />}
        </main>

        <footer className="foot">
          หน่วยปริมาณ = ลูกบาศก์เมตร (m³) ของคอนกรีต • Strength = ksc • วัตถุดิบ = kg/m³ &nbsp;·&nbsp; ข้อมูลปี 2569 จากไฟล์จริง (ม.ค.–เม.ย.)
        </footer>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
